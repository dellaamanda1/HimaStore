services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      # Kalau kamu mau paksa DB via docker, boleh uncomment ini:
      # DB_CONNECTION: mysql
      # DB_HOST: db
      # DB_PORT: 3306
      # DB_DATABASE: himastore_db
      # DB_USERNAME: root
      # DB_PASSWORD: root
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: himastore_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      # host port bisa diganti dari Jenkins: DB_HOST_PORT=3310 misalnya
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: